<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - create element</title>
</head>
<body style="background-color: #2e2e2e; color: #fff">
    

    <script>
        const div = document.createElement('div');
        console.log(div);
        div.id = Math.floor(Math.random() * 10 + 1);
        div.className = "main"
        div.setAttribute('title', 'generated text');
        div.style.backgroundColor = 'orange';
        div.style.padding = "10px";

        // div.innerText = "Learning DOM with JavaScript";
        const textNode = document.createTextNode("Learning DOM with JavaScript");
        div.appendChild(textNode);

        document.body.appendChild(div);
    </script>
</body>
</html>
