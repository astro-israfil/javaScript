<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - create and append element</title>
</head>
<body style="background-color: #2e2e2e; color: #fff">
    <ul class="language">
        <li>JavaScript</li>
    </ul>

    <script>
        function addListItem(language) {
            const li = document.createElement('li');
            li.appendChild(document.createTextNode(language));
            document.querySelector('.language').appendChild(li);
        }

        addListItem("Python");
        addListItem("Java");
        addListItem("TypeScript");

        // edit second li 
        const secondLi = document.querySelector('.language li:nth-child(2)');
        // console.log(secondLi);
        const newLi = document.createElement('li');
        newLi.appendChild(document.createTextNode("C++"));
        secondLi.replaceWith(newLi);

        // remove last li
        const lastLi = document.querySelector('li:last-child');
        lastLi.remove();
        // document.querySelector('.language').removeChild(lastLi);
    </script>
</body>
</html>
